# SD Model
  # Pretrain Model
mode: run
method: sdedit
pipe: "SD3I2I"
base_model: stabilityai/stable-diffusion-3-medium-diffusers
controlnet_model: InstantX/SD3-Controlnet-Canny

prompt: "a sharp, clean, natural photo, no motion blur, high detail"
negative_prompt: "motion blur, blurry, ghosting, smear, low quality, artifacts"

  # Model Hyperparameters
height1: 720
width1: 1280
sigmas: None
strength: 0.45 # SDE strength Bigger -> Pure Noise
guidance_scale: 6.0 #default 7
controlnet_scale: 1.0
steps: 40
seed: 42
canny_low: 100
canny_high: 200

# Checkpoint (path to LoRA safetensors file, null = no checkpoint)
checkpoint: null

# Data
input: /scratch2/james2602/playground/Motionblur/Motionblur/dataset/gopro/blur/images/000001.png
output: ./results/img2img/v
save_grid: true
grid_output: null

# Wandb
use_wandb: false
wandb_entity: MotionBlur
wandb_project: SD3_LoRA_finetuning

# Others
device: null

train:
  tuning_architecture: SD3  # "SD3" or "controlnetSD3"
  output_dir: ./results/lora/sd3_img2img
  weight_name: sd3_lora.safetensors
  max_train_steps: 10000
  save_every: 2000
  val_every: 500
  learning_rate: 1.0e-4
  weight_decay: 0.0
  max_grad_norm: 1.0
  gradient_checkpointing: true
  train_text_encoders: false
  rank: 8
  alpha: 8
  text_encoder_rank: 4
  text_encoder_alpha: 4
  dropout: 0.0
  weighting_scheme: none
  log_every: 50
  target_modules:
    - to_q
    - to_k
    - to_v
    - to_out.0

  data:
    blur_dir: /scratch2/james2602/playground/Motionblur/Motionblur/dataset/gopro/blur/images
    sharp_dir: /scratch2/james2602/playground/Motionblur/Motionblur/dataset/gopro/sharp/images
    split_file: /scratch2/james2602/playground/Motionblur/Motionblur/dataset/gopro/split.json
    resolution: 512
    num_workers: 4

hydra:
  run:
    dir: .
  output_subdir: null
