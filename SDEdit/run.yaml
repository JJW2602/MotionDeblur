# SDEdit workspace — SD3.5 Img2Img for motion deblurring
mode: inference            # train | test | inference
name: baseline_sd35        # experiment name → result/<name>/<mode>/

# Model
base_model: stabilityai/stable-diffusion-3.5-large
cpu_offload: true

# Prompt
prompt: "a sharp, clean, natural photo, no motion blur, high detail"
negative_prompt: "motion blur, blurry, ghosting, smear, low quality, artifacts"

# Inference / single-run defaults
input: /scratch2/james2602/playground/Motionblur/dataset/gopro/blur/images/000007.png
strength: 0.5
guidance_scale: 6.0
steps: 40
seed: 42

# LoRA checkpoint (null = no LoRA)
checkpoint: null

# Test-mode sweep grid
test:
  strengths: [0.3, 0.5, 0.7]
  guidance_scales: [4.0, 7.0]
  steps_list: [30]
  save_images: false
  num_images: 20    # null = full split, otherwise truncate to this many

# Train-mode LoRA fine-tuning
train:
  max_train_steps: 10000
  save_every: 2000
  val_every: 500
  learning_rate: 1.0e-4
  weight_decay: 0.0
  max_grad_norm: 1.0
  gradient_checkpointing: true
  rank: 8
  alpha: 8
  dropout: 0.0
  weighting_scheme: none
  target_modules:
    - to_q
    - to_k
    - to_v
    - to_out.0

# Data (shared train + test)
data:
  blur_dir: /scratch2/james2602/playground/Motionblur/dataset/gopro/blur/images
  sharp_dir: /scratch2/james2602/playground/Motionblur/dataset/gopro/sharp/images
  split_file: /scratch2/james2602/playground/Motionblur/dataset/gopro/split.json
  resolution: 512
  num_workers: 4

# Wandb
use_wandb: false
wandb_entity: MotionBlur
wandb_project: SDEdit_LoRA

hydra:
  run:
    dir: .
  output_subdir: null
